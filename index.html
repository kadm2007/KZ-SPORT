<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <meta name="theme-color" content="#060409">
  <title>منصة البث المباشر المستقرة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-main: #060409;
      --bg-surface: #110d1a;
      --bg-card: #191428;
      --neon-purple: #bd00ff;
      --neon-cyan: #00f0ff;
      --neon-green: #39ff14;
      --text-master: #ffffff;
      --text-muted: #8b859e;
      --border-glow: 1px solid rgba(189, 0, 255, 0.15);
      --font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
    }
    body { font-family: var(--font-family); background: var(--bg-main); color: var(--text-master); min-height: 100vh; }
    
    #speedTestOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    .speed-card { background: var(--bg-surface); border: var(--border-glow); padding: 40px 30px; border-radius: 24px; max-width: 450px; width: 100%; text-align: center; }
    .start-btn { background: linear-gradient(135deg, var(--neon-purple), #7b00ff); color: #fff; border: none; padding: 12px 35px; font-weight: 700; border-radius: 12px; cursor: pointer; margin-top: 20px; }
    
    #mainApp { display: none; }
    .main-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .screen-theater { background: var(--bg-surface); border-radius: 20px; overflow: hidden; margin-bottom: 25px; border: var(--border-glow); }
    .screen-canvas { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
    #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }
    .screen-dashboard { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #0d0a14; }
    
    .quality-controller { padding: 15px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border-top: 1px solid rgba(255,255,255,0.03); }
    .quality-controller label { font-size: 13px; font-weight: 700; color: var(--text-muted); }
    .q-btn { background: #1c162e; border: 1px solid rgba(255,255,255,0.08); color: var(--text-master); padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .q-btn.active { background: rgba(0, 240, 255, 0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); }
    
    .channels-deck { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .deck-button { background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 14px; padding: 15px; color: var(--text-master); cursor: pointer; text-align: center; }
    .deck-button.active { border-color: var(--neon-purple); background: rgba(189, 0, 255, 0.05); }
    #statusBadge { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; }
    .streaming { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); }
    .loading { background: rgba(255, 240, 0, 0.1); color: #fff340; }
    @media (max-width: 480px) { .channels-deck { grid-template-columns: repeat(3, 1fr); gap: 6px; } }
  </style>
</head>
<body>

<div id="speedTestOverlay">
  <div class="speed-card">
    <h2 style="font-weight:900; margin-bottom:10px;">⚡ تهيئة الاتصال المباشر</h2>
    <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">يتم ضبط بروتوكولات الحماية ومزامنة الـ IP لتفادي مشاكل الحظر وتأمين جودة مستقرة.</p>
    <div id="speedStatus" style="font-weight:700; color:var(--neon-cyan); margin-bottom:10px;">جاهز للبدء...</div>
    <button class="start-btn" id="startCheckBtn" onclick="runSpeedTest()">اتصال ودخول المنصة</button>
  </div>
</div>

<div id="mainApp">
  <div class="main-container">
    <div class="screen-theater">
      <div class="screen-canvas">
        <video id="video" controls autoplay playsinline></video>
      </div>
      <div class="screen-dashboard">
        <span id="currentChannel" style="font-weight:700;">اختر قناة لمشاهدة المباراة</span>
        <span id="statusBadge" class="loading">⏸ متوقف</span>
      </div>
      
      <div class="quality-controller">
        <label>⚙️ التحكم بالدقة لمنع التقطيع:</label>
        <button class="q-btn active" id="q-auto" onclick="changeQuality('auto', this)">تلقائي ذكي</button>
        <button class="q-btn" id="q-0" onclick="changeQuality(0, this)">دقة منخفضة (توفير البيانات)</button>
        <button class="q-btn" id="q-1" onclick="changeQuality(1, this)">اقتصادية (360p)</button>
        <button class="q-btn" id="q-2" onclick="changeQuality(2, this)">متوسطة (480p)</button>
        <button class="q-btn" id="q-3" onclick="changeQuality(3, this)">عالية (HD)</button>
      </div>
    </div>

    <div class="channels-deck" id="channelGrid"></div>
  </div>
</div>

<script>
const CHANNELS = {
  "BEIN Sports 1": "beee1", "BEIN Sports 2": "beee2", "BEIN Sports 3": "beee3",
  "BEIN Sports 4": "beee4", "BEIN Sports 5": "beee5", "BEIN Sports 6": "beee6",
  "BEIN MAX 1": "beemax1", "BEIN MAX 2": "beemax2", "BEIN MAX 3": "beemax3",
  "BEIN MAX 4": "beemax4", "BEIN MAX 5": "beemax5", "BEIN MAX 6": "beemax6"
};

let hls = null;
let isSlowNetwork = false;

async function runSpeedTest() {
  document.getElementById('startCheckBtn').style.display = 'none';
  document.getElementById('speedStatus').textContent = '⏳ جاري مزامنة بروتوكول الحماية للشبكة...';
  
  try {
    await fetch('/api/channel?ch=beee1');
    document.getElementById('speedStatus').textContent = '✅ تم التوثيق بنجاح! جاري تحويلك للمشغل.';
    setTimeout(enterApp, 500);
  } catch (e) {
    enterApp();
  }
}

function enterApp() {
  document.getElementById('speedTestOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  initChannels();
}

async function playChannel(chName) {
  const badge = document.getElementById('statusBadge');
  badge.textContent = '⏳ جاري توليد تذكرة البث...';
  badge.className = 'loading';
  document.getElementById('currentChannel').textContent = chName;
  document.querySelectorAll('.deck-button').forEach(b => b.classList.toggle('active', b.dataset.name === chName));

  try {
    const r = await fetch(`/api/channel?ch=${CHANNELS[chName]}`);
    const data = await r.json();
    if (!data.ok || !data.stream_url) {
      badge.textContent = '❌ غير متوفرة حالياً'; return;
    }

    const video = document.getElementById('video');
    if (hls) hls.destroy();

    // الحل الجذري: نطلب الرابط الأصلي مباشرة من المتصفح لمنع الـ 404 الناتج عن الـ IP
    const playUrl = data.stream_url;

    if (Hls.isSupported()) {
      hls = new Hls({
        enableWorker: true,
        maxBufferLength: 45,
        stableBufferDelay: 3,
        // إجبار المتصفح على إرسال طلبات الـ M3U8 والـ TS كـ Requests تحمل بصمة التطبيق الأصلي
        xhrSetup: function (xhr, url) {
          xhr.setRequestHeader("User-Agent", "BuzCup/2.0 (+https://buzcup.net; Flutter; Dart) AppleCoreMedia/1.0");
        }
      });
      hls.loadSource(playUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        badge.textContent = '🟢 مباشر';
        badge.className = 'streaming';
        hls.currentLevel = -1; // تلقائي
        setActiveBtn(document.getElementById('q-auto'));
        video.play().catch(()=>{});
      });
      
      hls.on(Hls.Events.ERROR, function (event, data) {
        if (data.fatal) {
          badge.textContent = '🔄 جاري إعادة الاتصال...';
          hls.startLoad();
        }
      });

    } else {
      // للأجهزة التي تدعم تشغيل هيدر الـ HLS داخلياً كـ Safari / Apple TV
      video.src = playUrl;
    }
  } catch(e) {
    badge.textContent = '⚠️ خطأ بالاتصال';
  }
}

function changeQuality(level, element) {
  if (!hls || hls.levels.length === 0) return;
  if (level === 'auto') {
    hls.currentLevel = -1; 
  } else {
    if (level < hls.levels.length) {
      hls.currentLevel = level;
    } else {
      hls.currentLevel = hls.levels.length - 1;
    }
  }
  setActiveBtn(element);
}

function setActiveBtn(el) {
  if(!el) return;
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function initChannels() {
  const grid = document.getElementById('channelGrid');
  grid.innerHTML = '';
  Object.keys(CHANNELS).forEach((name, idx) => {
    const b = document.createElement('button');
    b.className = 'deck-button';
    b.dataset.name = name;
    b.innerHTML = `<strong style="display:block; font-size:16px;">⚽ ${name.includes('MAX') ? 'MAX '+name.split('MAX ')[1] : idx+1}</strong><span style="font-size:11px; color:var(--text-muted);">${name}</span>`;
    b.onclick = () => playChannel(name);
    grid.appendChild(b);
  });
}
</script>
</body>
</html>
